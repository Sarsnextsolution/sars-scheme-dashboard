<!DOCTYPE html>
<html>
<head>
  <title>Premium Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>SARS</h2>
    <p>Dashboard</p>
    <p>Analytics</p>
    <p>Reports</p>
  </div>

  <!-- Main -->
  <div class="main">

    <h1>Scheme Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
      <div class="card glass">
        <p>Total Beneficiaries</p>
        <h2 id="totalUsers"></h2>
      </div>

      <div class="card glass">
        <p>Total Amount</p>
        <h2 id="totalAmount"></h2>
      </div>

      <div class="card glass">
        <p>States Covered</p>
        <h2 id="stateCount"></h2>
      </div>
    </div>

    <!-- Filter -->
    <select id="stateFilter" class="glass">
      <option value="All">All States</option>
      <option value="AP">Andhra Pradesh</option>
      <option value="TS">Telangana</option>
      <option value="MH">Maharashtra</option>
      <option value="KA">Karnataka</option>
      <option value="TN">Tamil Nadu</option>
    </select>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-box glass">
        <canvas id="barChart"></canvas>
      </div>

      <div class="chart-box glass">
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <!-- Table -->
    <div class="table glass">
      <table id="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>State</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
